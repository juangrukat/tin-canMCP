version: '3.8'

services:
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tin-canmcp
    ports:
      - "8000:8000"
    volumes:
      # For development, uncomment to mount the current directory:
      - ./main.py:/app/main.py:ro
      - ./app:/app/app:ro
    environment:
      - PYTHONUNBUFFERED=1
      - MCP_TRANSPORT=sse
    restart: unless-stopped
